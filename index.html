<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>じゃんけん</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#c8eaf8;--surface:#e8f4fc;--border:rgba(0,80,160,0.15);
  --text:#1a2a4a;--muted:rgba(30,60,120,0.55);--accent:#1a6fd4;
  --green:#1a8c3a;--red:#d93025;--yellow:#b45309;
  --font-body:'M PLUS Rounded 1c',sans-serif;--font-mono:'DotGothic16',monospace;
}
html,body{min-height:100%;font-family:var(--font-body);}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(160deg,#a8d8f0 0%,#c8eaf8 50%,#b8e2f5 100%);}

.card{
  background:var(--surface);border:1px solid var(--border);border-radius:22px;
  padding:44px 40px;width:100%;max-width:480px;text-align:center;color:var(--text);
  box-shadow:0 12px 40px rgba(0,80,160,0.15),inset 0 1px 0 rgba(255,255,255,0.8);
  animation:fadeUp .38s cubic-bezier(.22,1,.36,1);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

.logo{font-family:var(--font-mono);font-size:10px;letter-spacing:6px;color:rgba(0,80,160,0.35);margin-bottom:36px;text-transform:uppercase;}
h1{font-size:30px;font-weight:800;margin-bottom:10px;letter-spacing:-.5px;color:#0d1f3c;}
h2{font-size:20px;font-weight:700;margin-bottom:10px;color:#0d1f3c;}
.sub{color:var(--muted);font-size:13px;line-height:1.8;margin-bottom:24px;}
.sub strong{color:#0d1f3c;}

.badge{
  display:inline-block;background:rgba(26,111,212,0.12);border:1px solid rgba(26,111,212,0.3);
  color:#1a6fd4;font-size:10px;font-weight:700;letter-spacing:3px;
  padding:4px 14px;border-radius:20px;margin-bottom:22px;font-family:var(--font-mono);
}
.badge-host{background:rgba(180,83,9,0.1);border-color:rgba(180,83,9,0.3);color:#b45309;}

.inp{
  width:100%;background:#1a6fd4;border:2px solid #5aaff7;border-radius:12px;
  color:#fff;font-size:16px;font-weight:700;font-family:var(--font-body);padding:14px 16px;
  margin-bottom:10px;outline:none;transition:all .2s;
}
.inp:focus{border-color:#90d0ff;box-shadow:0 0 16px rgba(26,111,212,0.4);}
.inp::placeholder{color:rgba(255,255,255,0.75);font-weight:400;}

.num-row{display:flex;gap:8px;margin-bottom:20px;justify-content:center;}
.num-btn{
  width:60px;height:60px;border-radius:14px;border:2px solid rgba(0,80,160,0.2);
  background:#fff;color:#1a6fd4;font-size:15px;font-weight:800;
  cursor:pointer;transition:all .18s;font-family:var(--font-body);line-height:1.2;
}
.num-btn:hover{border-color:#1a6fd4;background:#e8f2ff;}
.num-btn.active{border-color:#1a6fd4;color:#fff;background:#1a6fd4;box-shadow:0 0 16px rgba(26,111,212,0.3);}

.btn{
  display:block;width:100%;padding:15px;border-radius:13px;border:none;
  font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-body);
  letter-spacing:.5px;margin-top:10px;transition:all .15s;
}
.btn-ghost{background:transparent;border:2px solid rgba(0,80,160,0.2);color:#1a6fd4;}
.btn-ghost:hover{border-color:#1a6fd4;background:#e8f2ff;}
.btn-share{background:linear-gradient(135deg,#b45309,#f59e0b);color:#fff;font-size:16px;padding:17px;box-shadow:0 4px 20px rgba(245,158,11,0.35);}
.btn-share:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,158,11,0.45);}
.btn-result{background:linear-gradient(135deg,#166534,#22c55e);color:#fff;font-size:16px;padding:17px;box-shadow:0 4px 20px rgba(34,197,94,0.3);}
.btn-result:hover{filter:brightness(1.1);transform:translateY(-2px);}

.hand-row{display:flex;gap:10px;margin:20px 0;}
.hand-btn{
  flex:1;background:#fff;border:2px solid rgba(0,80,160,0.15);
  border-radius:17px;padding:22px 6px 16px;cursor:pointer;
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  box-shadow:0 2px 8px rgba(0,80,160,0.08);
}
.hand-btn:hover{
  background:#e8f2ff;border-color:#1a6fd4;
  transform:translateY(-7px) scale(1.05);box-shadow:0 14px 32px rgba(26,111,212,0.2);
}
.hand-btn .em{font-size:44px;line-height:1;}
.hand-btn .lb{font-size:11px;color:#1a6fd4;font-weight:700;letter-spacing:2px;font-family:var(--font-mono);}

.progress-wrap{margin:16px 0 8px;}
.progress-label{font-size:11px;color:var(--muted);font-family:var(--font-mono);letter-spacing:2px;margin-bottom:8px;}
.progress-bar{width:100%;height:6px;background:rgba(0,80,160,0.1);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#1a6fd4,#5aaff7);transition:width .4s ease;}

.players{margin:16px 0;text-align:left;}
.player-row{
  display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;
  background:#fff;border:1px solid rgba(0,80,160,0.12);
  margin-bottom:8px;box-shadow:0 2px 6px rgba(0,80,160,0.06);
}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#1a6fd4,#5aaff7);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;flex-shrink:0;color:#fff;
}
.pname{font-size:14px;font-weight:700;flex:1;color:#0d1f3c;}
.pstatus{font-size:11px;font-family:var(--font-mono);color:#1a6fd4;}

.url-area{
  width:100%;background:#ddeef8;border:1px solid rgba(0,80,160,0.2);
  border-radius:12px;padding:13px 15px;font-size:10.5px;color:#1a4a7a;
  font-family:var(--font-mono);line-height:1.7;resize:none;outline:none;margin:10px 0 4px;
}

.result-panel{margin:18px 0;padding:22px 18px;border-radius:18px;background:#fff;border:1px solid rgba(0,80,160,0.1);box-shadow:0 4px 16px rgba(0,80,160,0.08);}
.outcome{font-size:32px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px;}
.winner-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:11px;margin-bottom:7px;font-size:14px;font-weight:700;}
.winner-row.win{background:rgba(26,140,58,0.1);border:1px solid rgba(26,140,58,0.25);color:#0d5c1f;}
.winner-row.lose{background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.08);color:#666;}
.winner-row.draw{background:rgba(180,83,9,0.08);border:1px solid rgba(180,83,9,0.2);color:#7a3a00;}
.verify{display:inline-flex;align-items:center;gap:6px;font-size:10px;padding:4px 12px;border-radius:20px;font-family:var(--font-mono);}
.verify-ok{background:rgba(26,140,58,0.1);color:#1a8c3a;border:1px solid rgba(26,140,58,0.2);}
.verify-ng{background:rgba(217,48,37,0.1);color:#d93025;border:1px solid rgba(217,48,37,0.2);}

.err{color:var(--red);font-size:13px;margin-top:10px;}
.how{margin-top:28px;text-align:left;padding:17px;background:rgba(0,80,160,0.05);border-radius:13px;border:1px solid rgba(0,80,160,0.1);}
.how-title{font-size:9px;color:rgba(0,80,160,0.4);letter-spacing:4px;margin-bottom:12px;font-family:var(--font-mono);text-transform:uppercase;}
.how-step{display:flex;gap:10px;font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:7px;align-items:flex-start;}
.how-step .n{color:#1a6fd4;font-weight:700;flex-shrink:0;font-family:var(--font-mono);}

@media(max-width:480px){.card{padding:32px 22px;}h1{font-size:24px;}}
</style>
</head>
<body>
<div class="card" id="app"></div>
<script>
const HANDS=['rock','scissors','paper'];
const EMOJI={rock:'✊',scissors:'✌️',paper:'🖐️'};
const JP={rock:'グー',scissors:'チョキ',paper:'パー'};
const BEATS={rock:'scissors',scissors:'paper',paper:'rock'};

async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function randomNonce(){
  return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function enc(obj){return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));}
function dec(str){try{return JSON.parse(decodeURIComponent(escape(atob(str))));}catch{return null;}}
function getState(){const h=location.hash.slice(1);return h?dec(h):null;}
function pushState(obj){location.hash=enc(obj);}

function judgeAll(hands){
  const u=[...new Set(hands)];
  if(u.length===1||u.length===3)return{draw:true};
  const strongHand=BEATS[u[0]]===u[1]?u[0]:u[1];
  return{draw:false,strongHand};
}

const app=document.getElementById('app');
function render(html){app.innerHTML=html;app.style.animation='none';void app.offsetWidth;app.style.animation='';}
function selectAll(el){setTimeout(()=>el.select(),50);}

// ── HOST: 人数を設定してURLを送る ─────────────────────────────
let selectedNum=2;

function showHome(){
  selectedNum=2;
  render(`
    <div class="logo">✊ ✌️ 🖐️ &nbsp; Online Janken</div>
    <h1>じゃんけん</h1>
    <p class="sub">ホストとして参加人数を設定し、<br/>最初の参加者にURLを送りましょう。<br/>ホスト自身は手を出しません。</p>
    <p style="font-size:11px;color:var(--muted);margin-bottom:10px;font-family:var(--font-mono);letter-spacing:2px;">参加人数を選ぶ</p>
    <div class="num-row" id="numRow"></div>
    <button class="btn btn-share" id="startBtn" onclick="startGame()">📤 参加者にURLを送る</button>
    <div class="how">
      <div class="how-title">How it works</div>
      <div class="how-step"><span class="n">1</span><span>ホストが人数を設定してURLを送る</span></div>
      <div class="how-step"><span class="n">2</span><span>参加者が順番に手を選んで次の人に送る</span></div>
      <div class="how-step"><span class="n">3</span><span>全員が選んだら自動で結果表示！</span></div>
      <div class="how-step"><span class="n">4</span><span>結果を全員にシェアできる</span></div>
    </div>
  `);
  const numRow=document.getElementById('numRow');
  [2,3,4,5].forEach(n=>{
    const btn=document.createElement('button');
    btn.className='num-btn'+(n===selectedNum?' active':'');
    btn.innerHTML=n+'人';
    btn.onclick=()=>{
      selectedNum=n;
      document.querySelectorAll('.num-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    };
    numRow.appendChild(btn);
  });
}

function startGame(){
  const state={players:[],total:selectedNum,phase:'collect'};
  pushState(state);
  const url=location.href;
  // Reset hash to clean (host doesn't join)
  doShare(url,'📤 参加者にURLを送る', document.getElementById('startBtn'));
}

// ── PLAY: 参加者が手を選ぶ ────────────────────────────────────
function showPlay(){
  const state=getState();
  if(!state){showHome();return;}
  const done=state.players.length;
  const total=state.total;
  const pct=Math.round((done/total)*100);
  render(`
    <div class="badge">${done} / ${total} 人 完了</div>
    <h2>手を選んでください</h2>
    <p class="sub">名前を入力して手を選んでください。<br/>
    <span style="font-size:11px">あなたの手は他の人には見えません</span></p>
    <div class="progress-wrap">
      <div class="progress-label">${done} / ${total} 人が選択済み</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${done>0?`<div class="players">${state.players.map(p=>`
      <div class="player-row">
        <div class="avatar">${p.name[0]}</div>
        <div class="pname">${p.name}</div>
        <div class="pstatus">✓ 選択済み</div>
      </div>`).join('')}</div>`:''}
    <input class="inp" id="nameInp" placeholder="あなたの名前" maxlength="12"/>
    <div class="hand-row" id="handRow"></div>
    <div id="err"></div>
  `);
  const handRow=document.getElementById('handRow');
  HANDS.forEach(h=>{
    const btn=document.createElement('button');
    btn.className='hand-btn';
    btn.innerHTML=`<span class="em">${EMOJI[h]}</span><span class="lb">${JP[h]}</span>`;
    btn.onclick=()=>commitHand(h);
    handRow.appendChild(btn);
  });
}

// ── COMMIT ────────────────────────────────────────────────────
async function commitHand(hand){
  const nameInp=document.getElementById('nameInp');
  const name=nameInp?nameInp.value.trim():'';
  if(!name){document.getElementById('err').innerHTML='<p class="err">名前を入力してください</p>';return;}
  const state=getState();
  if(!state){showHome();return;}
  if(state.players.find(p=>p.name===name)){
    document.getElementById('err').innerHTML='<p class="err">その名前はすでに参加しています</p>';return;
  }
  const nonce=randomNonce();
  const hash=await sha256(nonce+hand);
  state.players.push({name,hash,_nonce:nonce,_hand:hand});

  // 全員揃ったら結果へ
  if(state.players.length>=state.total){
    state.phase='reveal';
    pushState(state);
    showReveal();
  } else {
    pushState(state);
    showSharePlay(state,name,hand);
  }
}

// ── SHARE (参加者が次の人へ) ──────────────────────────────────
function showSharePlay(state,myName,myHand){
  const url=location.href;
  const done=state.players.length;
  const total=state.total;
  const pct=Math.round((done/total)*100);
  render(`
    <div class="badge">${done} / ${total} 人 完了</div>
    <h2>次の人に送ろう！</h2>
    <p class="sub">
      <strong>${myName}</strong> の手：<strong style="font-size:20px">${EMOJI[myHand]} ${JP[myHand]}</strong><br/>
      <span style="font-size:11px">ハッシュ化されているので他の人には見えません</span>
    </p>
    <div class="progress-wrap">
      <div class="progress-label">${done} / ${total} 人が選択済み</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="players">${state.players.map(p=>`
      <div class="player-row">
        <div class="avatar">${p.name[0]}</div>
        <div class="pname">${p.name}</div>
        <div class="pstatus">✓ 選択済み</div>
      </div>`).join('')}
    </div>
    <textarea class="url-area" readonly rows="3" id="urlArea" style="display:none">${url}</textarea>
    <button class="btn btn-share" id="shareBtn">📤 次の人に送る</button>
  `);
  document.getElementById('shareBtn').onclick=function(){
    doShare(url,'📤 次の人に送る',this);
  };
  setTimeout(()=>{const b=document.getElementById('shareBtn');if(b)b.click();},300);
}

// ── REVEAL ────────────────────────────────────────────────────
async function showReveal(){
  const state=getState();
  if(!state||state.players.length<2){return;}
  let allOk=true;
  const verified=[];
  for(const p of state.players){
    if(!p._nonce||!p._hand){allOk=false;verified.push({...p,ok:false});continue;}
    const expected=await sha256(p._nonce+p._hand);
    const ok=expected===p.hash;
    if(!ok)allOk=false;
    verified.push({...p,ok});
  }
  const hands=verified.map(p=>p._hand).filter(Boolean);
  const judged=hands.length===verified.length?judgeAll(hands):null;
  let rows='';
  for(const p of verified){
    let cls='lose',label='';
    if(!judged){cls='draw';}
    else if(judged.draw){cls='draw';label='🤝';}
    else if(p._hand===judged.strongHand){cls='win';label='🏆 勝ち';}
    else{cls='lose';label='負け';}
    rows+=`<div class="winner-row ${cls}">
      <span style="font-size:28px">${p._hand?EMOJI[p._hand]:'❓'}</span>
      <span style="flex:1;font-size:14px;font-weight:700">${p.name}</span>
      <span style="font-size:13px">${p._hand?JP[p._hand]:'不明'}</span>
      <span style="font-size:13px;margin-left:8px">${label}</span>
    </div>`;
  }
  let outcomeText='',outcomeColor='';
  if(!judged){outcomeText='❓ データ不足';outcomeColor='var(--muted)';}
  else if(judged.draw){outcomeText='🤝 あいこ！';outcomeColor='var(--yellow)';}
  else{outcomeText=`${EMOJI[judged.strongHand]} ${JP[judged.strongHand]} の勝ち！`;outcomeColor='var(--green)';}

  const resultUrl=location.href;
  render(`
    <div class="badge">RESULT</div>
    <div class="outcome" style="color:${outcomeColor}">${outcomeText}</div>
    <div class="result-panel">
      ${rows}
      <div style="margin-top:14px">
        <span class="verify ${allOk?'verify-ok':'verify-ng'}">
          ${allOk?'✓ 全員のハッシュ検証OK・不正なし':'⚠ 一部の検証に失敗しました'}
        </span>
      </div>
    </div>
    <textarea class="url-area" readonly rows="3" id="resultArea" style="display:none">${resultUrl}</textarea>
    <button class="btn btn-result" id="resultShareBtn">📤 結果を全員にシェア</button>
    <button class="btn btn-ghost" onclick="resetGame()" style="margin-top:8px">🔄 もう一度やる</button>
  `);
  document.getElementById('resultShareBtn').onclick=function(){
    doShare(resultUrl,'📤 結果を全員にシェア',this);
  };
}

// ── SHARE HELPER ──────────────────────────────────────────────
async function doShare(originalUrl, label, btn){
  if(btn){btn.textContent='⏳ 短縮中...';btn.disabled=true;}
  let url=originalUrl;
  try{
    const res=await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(originalUrl)}`);
    const data=await res.json();
    if(data.shorturl)url=data.shorturl;
  }catch{}
  if(btn){btn.disabled=false;btn.textContent=label;}
  if(navigator.share){
    try{await navigator.share({title:'じゃんけんしよう！',text:'じゃんけんに参加してください👊',url});}catch{}
  }
}

function resetGame(){location.hash='';location.reload();}

// ── ROUTER ────────────────────────────────────────────────────
function init(){
  const state=getState();
  if(!state){showHome();}
  else if(state.phase==='reveal'){showReveal();}
  else{showPlay();}
}
init();
</script>
</body>
</html>
